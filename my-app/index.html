<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quillweave</title>
    <meta name="description" content="A home for writers with more ideas than finished drafts" />

    <!-- Open Graph / link-preview cards (Discord, Slack, iMessage, etc.) —
         crawlers don't run JS, so AppMetaTags' runtime updates never reach
         them. These static tags are what they actually read. -->
    <meta property="og:site_name" content="Quillweave" />
    <meta property="og:title" content="Quillweave — A Home for Writers" />
    <meta property="og:description" content="A home for writers with more ideas than finished drafts." />
    <meta property="og:image" content="/icons/apple-touch-icon.png" />
    <meta property="og:url" content="https://quillweave.com.ng/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Quillweave — A Home for Writers" />
    <meta property="twitter:description" content="A home for writers with more ideas than finished drafts." />
    <meta property="twitter:image" content="/icons/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d3748" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quillweave" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
